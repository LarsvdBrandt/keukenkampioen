function stars(score){
  const full=Math.floor(score/2);
  const half=(score*10)%20>=5?1:0;
  const empty=5-full-half;
  const starSVG=(fill)=>`<svg viewBox="0 0 24 24" fill="${fill}" xmlns="http://www.w3.org/2000/svg" style="width:1em;height:1em;display:inline-block;vertical-align:-0.15em"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" stroke="none"/></svg>`;
  const halfSVG=`<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:1em;height:1em;display:inline-block;vertical-align:-0.15em"><defs><linearGradient id="hg"><stop offset="50%" stop-color="currentColor"/><stop offset="50%" stop-color="transparent"/></linearGradient></defs><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="url(#hg)" stroke="currentColor" stroke-width="1.5"/></svg>`;
  const emptySVG=`<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:1em;height:1em;display:inline-block;vertical-align:-0.15em"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>`;
  return starSVG('currentColor').repeat(full)+(half?halfSVG:'')+emptySVG.repeat(empty);
}

function scoreBadgeStyle(s){
  if(s>=9)return'background:#052e16;color:#4ade80';
  if(s>=8)return'background:#052e16;color:#86efac';
  if(s>=7)return'background:#1c1a07;color:#fde047';
  return'background:#1c0707;color:#f87171';
}

    ${label}
  </button>`;
}
