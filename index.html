function stars(score){
  const full=Math.floor(score/2);
  const half=(score*10)%20>=5?1:0;
  const empty=5-full-half;
  const starSVG=(fill)=>`<svg viewBox="0 0 24 24" fill="${fill}" xmlns="http://www.w3.org/2000/svg" style="width:1em;height:1em;display:inline-block;vertical-align:-0.15em"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" stroke="none"/></svg>`;
  const halfSVG=`<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:1em;height:1em;display:inline-block;vertical-align:-0.15em"><defs><linearGradient id="hg"><stop offset="50%" stop-color="currentColor"/><stop offset="50%" stop-color="transparent"/></linearGradient></defs><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="url(#hg)" stroke="currentColor" stroke-width="1.5"/></svg>`;
  const emptySVG=`<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:1em;height:1em;display:inline-block;vertical-align:-0.15em"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>`;
  return starSVG('currentColor').repeat(full)+(half?halfSVG:'')+emptySVG.repeat(empty);
}

function scoreBadgeStyle(s){
  if(s>=9)return'background:#052e16;color:#4ade80';
  if(s>=8)return'background:#052e16;color:#86efac';
  if(s>=7)return'background:#1c1a07;color:#fde047';
  return'background:#1c0707;color:#f87171';
}

      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
        <span style="font-size:15px;font-weight:700;padding:5px 14px;border-radius:20px;${scoreBadgeStyle(co.score)}">${co.score}</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="color:var(--color-text-secondary)"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>`).join('')}
  </div>
</div>`;
}

function renderRecipe(cid,cname){
  const c=D.continents.find(x=>x.id===cid);
  const co=c.countries.find(x=>x.name===cname);
  let ingHTML='';
  co.ingredients.forEach(row=>{
    if(row.g){ingHTML+=`<div style="grid-column:1/-1;font-size:11px;font-weight:600;letter-spacing:1.5px;color:${c.color};padding-top:8px;padding-bottom:4px;">${row.g.toUpperCase()}</div>`;return;}
    row.forEach(item=>{if(item.trim())ingHTML+=`<div class="ing-chip" style="font-size:13px;color:var(--color-text-primary);background:var(--color-background-secondary);border-radius:8px;padding:8px 11px;">${item}</div>`;});
  });
  return`<div>
  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;color:var(--color-text-secondary);margin-bottom:20px;">
    <span onclick="showHome()" style="cursor:pointer;font-weight:500;" onmouseover="this.style.color='var(--color-text-primary)'" onmouseout="this.style.color='var(--color-text-secondary)'">Keuken Kampioen</span>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    <span onclick="showCont('${cid}')" style="cursor:pointer;font-weight:500;" onmouseover="this.style.color='var(--color-text-primary)'" onmouseout="this.style.color='var(--color-text-secondary)'">${c.name}</span>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    <span style="color:var(--color-text-primary);font-weight:500;">${co.name}</span>
  </div>

  <div style="background:${c.bg};border-radius:16px;padding:28px 24px;margin-bottom:20px;border-left:4px solid ${c.color};">
    <span style="font-size:48px;display:block;margin-bottom:12px;line-height:1;">${co.flag}</span>
    <p style="font-size:11px;letter-spacing:2px;color:${c.color};margin:0 0 6px;font-weight:600;">${c.name.toUpperCase()}</p>
    <h2 style="font-size:clamp(16px,3.5vw,22px);font-weight:700;color:${c.light};margin:0 0 14px;line-height:1.3;">${co.name} — ${co.dish}</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <span style="font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid ${c.color}44;color:${c.color};font-weight:500;">Voor ${co.persons} personen</span>
      <span style="font-size:12px;padding:4px 12px;border-radius:20px;${scoreBadgeStyle(co.score)};font-weight:600;">${co.score} / 10</span>
    </div>
  </div>

  <div style="background:var(--color-background-secondary);border-radius:12px;padding:20px 24px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
    <div>
      <p style="font-size:11px;letter-spacing:1.5px;color:var(--color-text-secondary);margin:0 0 6px;font-weight:600;">SCORE</p>
      <div style="font-size:38px;font-weight:700;${scoreBadgeStyle(co.score).includes('4ade')
        ?'color:#4ade80':scoreBadgeStyle(co.score).includes('86ef')
        ?'color:#86efac':scoreBadgeStyle(co.score).includes('fde0')
        ?'color:#fde047':'color:#f87171'};">${co.score}</div>
    </div>
    <div style="font-size:22px;${co.score>=8?'color:#86efac':co.score>=7?'color:#fde047':'color:#f87171'}">${stars(co.score)}</div>
  </div>

  <div style="background:var(--color-background-secondary);border-radius:12px;padding:16px 20px;margin-bottom:20px;border-left:3px solid ${c.color}33;border-radius:0 12px 12px 0;">
    <p style="font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--color-text-secondary);margin:0 0 8px;">OVER DIT LAND</p>
    <p style="font-size:14px;color:var(--color-text-secondary);line-height:1.75;margin:0;">${co.about}</p>
  </div>

  <div style="margin-bottom:20px;">
    <p style="font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--color-text-secondary);margin:0 0 12px;padding-bottom:8px;border-bottom:0.5px solid var(--color-border-tertiary);">INGREDIËNTEN</p>
    <div class="recipe-ing-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:7px;">${ingHTML}</div>
  </div>

  <div style="margin-bottom:20px;">
    <p style="font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--color-text-secondary);margin:0 0 12px;padding-bottom:8px;border-bottom:0.5px solid var(--color-border-tertiary);">BEREIDING</p>
    ${co.steps.map((s,i)=>`<div style="display:flex;gap:12px;margin-bottom:12px;align-items:flex-start;">
      <div style="width:26px;height:26px;border-radius:50%;background:${c.bg};border:1.5px solid ${c.color};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${c.color};flex-shrink:0;margin-top:1px;">${i+1}</div>
      <p style="font-size:14px;color:var(--color-text-primary);line-height:1.7;margin:0;padding-top:3px;">${s}</p>
    </div>`).join('')}
  </div>

  <div style="border:1px dashed var(--color-border-secondary);border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:14px;">
    <div style="width:36px;height:36px;border-radius:50%;background:#1DB95422;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1DB954" stroke-width="2" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    </div>
    <div>
      <p style="font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--color-text-secondary);margin:0 0 3px;">SPOTIFY NUMMER</p>
      <p style="font-size:13px;color:var(--color-text-secondary);margin:0;font-style:italic;">Vul hier jullie favoriete nummer in voor dit gerecht...</p>
    </div>
  </div>
</div>`;
}

function showHome(){document.getElementById('app').innerHTML=renderCover();}
function showCont(id){document.getElementById('app').innerHTML=renderCont(id);scrollToTop();}
function showRecipe(cid,n){document.getElementById('app').innerHTML=renderRecipe(cid,n);scrollToTop();}
function scrollToTop(){try{window.scrollTo({top:0,behavior:'smooth'});}catch(e){}}
showHome();
</script>
